services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibefinder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vibefinder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibefinder123}
      POSTGRES_DB: ${POSTGRES_DB:-vibefinder}
      # Performance tuning (optional)
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibefinder} -d ${POSTGRES_DB:-vibefinder}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Resource limits (optional, adjust as needed)
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
    name: vibefinder-postgres-data

networks:
  default:
    name: vibefinder-network
    external: true
