services:
  # Frontend - Development
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: vibefinder-frontend-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    profiles:
      - dev

  # Frontend - Production
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: vibefinder-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    profiles:
      - prod

networks:
  default:
    name: vibefinder-network
    external: true
