services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: vibefinder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vibefinder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibefinder123}
      POSTGRES_DB: ${POSTGRES_DB:-vibefinder}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibefinder} -d ${POSTGRES_DB:-vibefinder}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: vibefinder-chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibefinder-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vibefinder}:${POSTGRES_PASSWORD:-vibefinder123}@postgres:5432/${POSTGRES_DB:-vibefinder}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-vibefinder}:${POSTGRES_PASSWORD:-vibefinder123}@postgres:5432/${POSTGRES_DB:-vibefinder}
      # ChromaDB
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      CHROMADB_PERSIST_DIRECTORY: /app/chroma_data
      # Security
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      OAUTH_ENCRYPTION_KEY: ${OAUTH_ENCRYPTION_KEY:-change-this-in-production}
      # Ollama (assumes running on host machine)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      # MCP
      MCP_YTMUSIC_SERVER_PATH: ./app/mcp/youtube_music_server.py
      # CORS
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    volumes:
      - ./app:/app/app:ro
      - chroma_local_data:/app/chroma_data
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  chroma_data:
  chroma_local_data:

networks:
  default:
    name: vibefinder-network
